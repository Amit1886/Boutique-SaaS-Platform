name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: boutique_ai_saas/android_webview_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ FIX 1: Correct permissions
      - name: Fix permissions
        run: |
          chmod +x gradlew
          chmod -R 755 gradle

      # ✅ FIX 2: Use Java to run Gradle wrapper (IMPORTANT)
      - name: Build Debug APK
        run: java -jar gradle/wrapper/gradle-wrapper.jar assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: boutique_ai_saas/android_webview_app/app/build/outputs/apk/debug/*.apk
