{% extends "base.html" %}
{% block title %}Admin Wallet Adjust{% endblock %}
{% block content %}
  <div class="flex items-end justify-between gap-3">
    <div>
      <h1 class="text-2xl md:text-3xl font-bold">Admin Wallet Adjust</h1>
      <p class="text-slate-600 mt-1">Credit/debit any user wallet (staff only).</p>
    </div>
  </div>

  <div class="mt-6 card p-6 max-w-2xl">
    <form method="post" class="grid md:grid-cols-2 gap-4 items-end">
      {% csrf_token %}
      <div class="md:col-span-2">
        <label class="label">Username</label>
        <input class="input" type="text" name="username" placeholder="e.g. amit" required />
      </div>
      <div>
        <label class="label">Action</label>
        <select class="input" name="action">
          <option value="credit">Credit</option>
          <option value="debit">Debit</option>
        </select>
      </div>
      <div>
        <label class="label">Amount (INR)</label>
        <input class="input" type="number" step="0.01" name="amount" value="0" required />
      </div>
      <div class="md:col-span-2">
        <label class="label">Note</label>
        <input class="input" type="text" name="note" placeholder="Reason" />
      </div>
      <div class="md:col-span-2">
        <button class="btn-primary w-full" type="submit">Apply</button>
      </div>
    </form>
  </div>
{% endblock %}
