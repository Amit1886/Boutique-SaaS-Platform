name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boutique_ai_saas/android_webview_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build APKs
        run: |
          GRADLE_VERSION=8.2
          curl -sSLo gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -q gradle.zip -d "$HOME/gradle"
          "$HOME/gradle/gradle-${GRADLE_VERSION}/bin/gradle" assembleDebug assembleRelease

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ./app/build/outputs/apk/debug/app-debug.apk artifacts/app-debug.apk
          cp ./app/build/outputs/apk/release/app-release.apk artifacts/app-release.apk
          ls -la artifacts

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/*.apk
