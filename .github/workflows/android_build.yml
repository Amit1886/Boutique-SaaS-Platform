name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: boutique_ai_saas/android_webview_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ Install Gradle directly (NO WRAPPER)
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip gradle-8.6-bin.zip
          echo "$PWD/gradle-8.6/bin" >> $GITHUB_PATH

      # ✅ Build APK
      - name: Build APK
        run: gradle assembleDebug --stacktrace

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: boutique_ai_saas/android_webview_app/app/build/outputs/apk/debug/*.apk
