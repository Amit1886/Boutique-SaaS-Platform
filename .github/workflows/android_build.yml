name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: boutique_ai_saas/android_webview_app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Gradle 8.2
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip gradle-8.2-bin.zip
          export PATH="$PWD/gradle-8.2/bin:$PATH"

      - name: Build APK
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/*.apk artifacts/ || echo "No debug APK"
          cp app/build/outputs/apk/release/*.apk artifacts/ || echo "No release APK"
          ls -la artifacts

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/*.apk
