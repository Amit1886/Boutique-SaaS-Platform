name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: boutique_ai_saas/android_webview_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/*.apk artifacts/
          cp app/build/outputs/apk/release/*.apk artifacts/
          ls -la artifacts

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/*.apk
