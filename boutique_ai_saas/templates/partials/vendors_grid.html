{% for v in vendors %}
  <a href="/{{ v.subdomain }}/" class="card p-5 hover:shadow-md transition glass neon-ring">
    <div class="flex items-center gap-3">
      <div class="h-11 w-11 rounded-2xl border border-slate-200 bg-white/50 flex items-center justify-center font-extrabold floaty" style="color: {{ v.theme_color }};">
        {{ v.business_name|slice:":1" }}
      </div>
      <div>
        <div class="font-semibold">{{ v.business_name }}</div>
        <div class="text-sm text-slate-600">/{{ v.subdomain }}/ · {{ v.plan.name|default:"Plan" }}</div>
      </div>
    </div>
    <div class="mt-4 text-sm text-slate-700">
      Try virtual try-on, tailoring orders, POS, inventory, and magic effects.
    </div>
    <div class="mt-4 inline-flex items-center gap-2 text-sm font-semibold" style="color: {{ v.theme_color }};">
      Visit store <span>→</span>
    </div>
  </a>
{% empty %}
  <div class="text-slate-600">No vendors found.</div>
{% endfor %}
