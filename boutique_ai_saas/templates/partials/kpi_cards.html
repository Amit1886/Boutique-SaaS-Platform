<div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
  {% for k in cards %}
    <div class="card p-5 glass neon-ring">
      <div class="text-xs uppercase tracking-wider text-slate-600 dark:text-slate-300/70">{{ k.label }}</div>
      <div class="mt-2 text-3xl font-extrabold text-slate-900 dark:text-white">
        <span
          data-kpi="{{ k.value|default:0 }}"
          {% if k.prefix %}data-prefix="{{ k.prefix }}"{% endif %}
          {% if k.suffix %}data-suffix="{{ k.suffix }}"{% endif %}
        >0</span>
      </div>
      {% if k.hint %}
        <div class="mt-2 text-xs text-slate-600 dark:text-slate-200/70">{{ k.hint }}</div>
      {% endif %}
    </div>
  {% endfor %}
</div>
