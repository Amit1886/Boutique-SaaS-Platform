{% extends "base.html" %}
{% block title %}Signup Vendor{% endblock %}
{% block content %}
  <div class="max-w-xl mx-auto">
    <div class="card p-8">
      <h1 class="text-2xl md:text-3xl font-bold">Create your vendor boutique</h1>
      <p class="text-slate-600 mt-2">You’ll get a unique path `/<vendor>/` and optional subdomain routing support.</p>
      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        <div class="grid md:grid-cols-2 gap-3">
          <div>
            <label class="label">Business name</label>
            <input class="input" type="text" name="business_name" required />
          </div>
          <div>
            <label class="label">Vendor slug</label>
            <input class="input" type="text" name="subdomain" placeholder="e.g. shree-boutique" required />
          </div>
        </div>
        <div>
          <label class="label">Theme color</label>
          <input class="input" type="text" name="theme_color" value="#db2777" />
        </div>
        <div class="grid md:grid-cols-2 gap-3">
          <div>
            <label class="label">Username</label>
            <input class="input" type="text" name="username" required />
          </div>
          <div>
            <label class="label">Email</label>
            <input class="input" type="email" name="email" />
          </div>
        </div>
        <div>
          <label class="label">Password</label>
          <input class="input" type="password" name="password" required />
        </div>
        <button class="btn-primary w-full" type="submit">Create Vendor</button>
      </form>
    </div>
  </div>
{% endblock %}
